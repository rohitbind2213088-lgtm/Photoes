            document.getElementById("message").textContent="Timer started...";

                    document.getElementById("message").textContent="Hello! I appeared after 3 seconds.";
                }
                , 3000);

<body>


    <input type="button" value="click" onclick="counter()">



    <div class="container">
        <img id="t1" src="6.jpg">
        <img id="t2" src="7.jpg">
        <img id="t3" src="8.jpg">
    </div>
    <script>

        let count = 0;
        const total = 9;

        const t1 = document.getElementById("t1");
        const t2 = document.getElementById("t2");
        const t3 = document.getElementById("t3");

        function counter() {

            t1.src = `${count % total}.jpg`;
            t2.src = `${(count + 1) % total}.jpg`;
            t3.src = `${(count + 2) % total}.jpg`;
            count++;
            if (count > 8)
                count = 0;
        }
        let loop = setInterval("counter()", 1000);








    </script>
