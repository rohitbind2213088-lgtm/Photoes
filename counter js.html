<!DOCTYPE html>
<html>
<head>
    <title>Counter App</title>
    <style>
        body{
            text-align:center;
            margin-top:100px;
            font-family:Arial;
        }
        button{
            padding:10px 20px;
            font-size:20px;
            margin:10px;
        }
        h1{
            font-size:50px;
        }
    </style>
</head>
<body>

    <h1 id="count">0</h1>

    <button onclick="decrease()">-</button>
    <button onclick="increase()">+</button>

<script>
let count = 0;

function increase(){
    count++;
    document.getElementById("count").innerHTML = count;
}

function decrease(){
    count--;
    document.getElementById("count").innerHTML = count;
}
</script>

</body>
</html>
