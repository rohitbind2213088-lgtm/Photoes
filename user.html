<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
            .container{
                           display: flex;
                           justify-content: center;
                           flex-direction: column;
                           align-items: center;

            }

            button{
                   width: 100px;
                   height: 30px;
            }


            input{
                    
                      width: 300px;
                      height: 30px;
            }

            img{
                    width: 200px;
                    
            }
    


    </style>



</head>
<body>
     
    <div class="container"> 

    <input type="text" id="imgpath" placeholder="enter the img">
       <button onclick="showImage()">Show Image</button>
       <br><br>
       <img id="img">
       </div>

  <script>

       function showImage(){

             let path = document.getElementById("imgpath").value;
             document.getElementById("img").src = path;              

       }





  </script>

</body>
</html>
